name: Publish

# Triggered when you push a tag like ``python-v0.1.0`` (Python SDK release).
# The tag prefix lets future TypeScript / Go SDKs share this repo with their
# own tag namespaces (``typescript-v0.1.0``, etc.).

on:
  push:
    tags:
      - "python-v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted-publisher OIDC; no API token needed
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
